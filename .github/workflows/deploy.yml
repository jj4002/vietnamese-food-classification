name: CI/CD - Build & Deploy to Render

# Trigger: chỉ chạy khi push code lên nhánh main
on:
  push:
    branches:
      - main
  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:

jobs:
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Setup Docker Buildx (hỗ trợ build multi-platform & cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build image và push lên Docker Hub
      #    - Tag "latest" để Render luôn pull bản mới nhất
      #    - Tag theo commit SHA để dễ rollback
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vietnamese-food-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vietnamese-food-api:${{ github.sha }}
          # Cache layers để build nhanh hơn ở lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-render:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push  # Chỉ chạy sau khi build thành công

    steps:
      # 5. Gọi Render Deploy Hook để trigger deploy
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error
        # --fail: trả về exit code lỗi nếu HTTP status >= 400
        # --silent: ẩn progress bar
        # --show-error: vẫn hiện lỗi dù --silent

      - name: Deployment triggered successfully
        run: echo "✅ Render deployment triggered! Check https://dashboard.render.com"
