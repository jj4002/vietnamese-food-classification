services:
  food-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_classifier_api
    ports:
      - "8000:8000"
    volumes:
      # Mount model từ ngoài vào — không cần rebuild khi đổi model
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
